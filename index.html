<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <title>Weather Forecast</title>
</head>
<body>
    <main>
      <div class="card">
            <div class="top">
                <h1>Location</h1>
                <h1>20C</h1>
                <p class="img"><i class="ri-sun-cloudy-line"></i></p>
            </div>

            <div class="bottom">
                        <div class="wind">
                            <h3>12</h3>
                            <h3>wind</h3>
                        </div>

                        <div class="humidity">
                            <h3>12</h3>
                            <h3>humidity</h3>
                        </div>

                        <div class="feel">
                            <h3>12</h3>
                            <h3>feels</h3>
                        </div>      
            </div>

            <h3>Overcast Clouds</h3>
       

        <div class="info">
            <input type="text" placeholder="enter location to get weather">
            <button type="button">Get Weather</button>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
